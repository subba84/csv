<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hello World App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    button {
      padding: 12px 28px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #0078d4;
      color: white;
    }
    button:hover  { background: #005fa3; }
    button:active { background: #004a80; }
  </style>
</head>
<body>
  <button onclick="sayHello()">Click Me</button>

  <script>
    async function sayHello() {
      try {
        const res = await fetch('http://localhost:5050/api/hello');
        const data = await res.json();
        alert(data.message);
      } catch (e) {
        alert('Error: could not reach backend — ' + e.message);
      }
    }
  </script>
</body>
</html>
